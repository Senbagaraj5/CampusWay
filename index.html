<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <title>CampusWay | Fleet Tracking</title>
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        /* 1. Global Reset & Scroll Lock */
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            /* Lock parent scroll */
            font-family: 'Inter', sans-serif;
            position: fixed;
            /* Prevent mobile rubber-banding */
            -webkit-user-select: none;
            user-select: none;
            background: #f8fafc;
            /* bg-slate-50 */
        }

        #root {
            height: 100dvh;
            /* Dynamic viewport height for mobile */
            width: 100%;
            max-width: 430px; /* Mobile App Container */
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            /* Controlled scrolling only here */
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            -webkit-user-select: text;
            user-select: text;
            position: relative;
            background: #f8fafc; /* Keep standard bg */
        }
        
        /* Desktop drop shadow framing */
        @media (min-width: 431px) {
            #root {
                box-shadow: 0 0 40px rgba(0,0,0,0.3);
            }
        }

        /* 2. Map & UI Components */
        .gm-style-iw {
            border-radius: 1rem !important;
            padding: 0 !important;
        }

        .gm-ui-hover-text {
            display: none !important;
        }

        /* Custom Scrollbar for inner content */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        /* Leaflet map fix for mobile */
        .leaflet-container {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            touch-action: manipulation;
            width: 100%;
            height: 100%;
        }

        .leaflet-pane,
        .leaflet-tile,
        .leaflet-marker-shadow,
        .leaflet-shadow-pane {
            will-change: transform;
        }

        @media (max-width: 768px) {
            .leaflet-control-attribution {
                display: none !important;
            }
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
</body>

</html>
