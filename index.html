<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusWay Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow-x: hidden; 
            font-family: 'Inter', sans-serif;
            position: fixed;
            -webkit-user-select: none;
            user-select: none;
        }
        body { 
            height: 100vh; 
            height: 100svh;
            overflow: hidden;
        }
        #root { 
            min-height: 100vh; 
            min-height: 100svh;
            display: flex; 
            flex-direction: column;
            width: 100%;
            height: 100%;
            overflow: auto;
            -webkit-user-select: text;
            user-select: text;
        }
        .gm-style-iw { border-radius: 1rem !important; padding: 0 !important; }
        .gm-ui-hover-text { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Leaflet map fix for mobile */
        .leaflet-container { 
            font-family: 'Inter', sans-serif;
            background: #e2e8f0;
            touch-action: manipulation;
        }
        .leaflet-pane, .leaflet-tile, .leaflet-marker-shadow, .leaflet-shadow-pane {
            will-change: transform;
        }
        .leaflet-popup-content { 
            font-size: 12px;
            line-height: 1.4;
        }
        @media (max-width: 768px) {
            html, body {
                position: relative;
            }
            .leaflet-control-attribution { 
                display: none !important;
            }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
